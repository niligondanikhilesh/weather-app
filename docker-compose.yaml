version: '3'
services:
  weather-app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - WEATHER_API_KEY=013d29fd452161fd0a5c56c200052e5e
    depends_on:
      - redis

  redis:
    image: redis
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
